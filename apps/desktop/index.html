<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Git Manager</title>
  <style>
    /* Critical, inline splash styles: painted before any JS (or the Tailwind
       bundle) loads, so the app-startup window shows themed content instantly
       instead of a blank/transparent frame. Kept out of index.css on purpose. */
    html,
    body {
      background: hsl(222.2 84% 4.9%);
    }

    #app-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      overflow: hidden;
      background: hsl(222.2 84% 4.9%);
      color: hsl(210 40% 98%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      transition: opacity 180ms ease-out;
    }

    #app-splash[data-theme='light'] {
      background: hsl(0 0% 100%);
      color: hsl(222.2 84% 4.9%);
    }

    #app-splash.is-hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Decorative rising bubbles, same look as the landing page hero — hand-written
       (rather than JS-generated) so they're present in the very first paint. */
    .app-splash-bubbles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .app-splash-bubble {
      position: absolute;
      bottom: -60px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(0, 245, 224, 0.5), rgba(0, 180, 200, 0.15));
      border: 1px solid rgba(0, 229, 204, 0.3);
      animation: app-splash-bubble-rise linear infinite;
    }

    @keyframes app-splash-bubble-rise {
      0% {
        transform: translateY(0) translateX(0) scale(1);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 0.6;
      }
      100% {
        transform: translateY(-110vh) translateX(var(--drift)) scale(var(--end-scale));
        opacity: 0;
      }
    }

    .app-splash-content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    #app-splash .app-splash-mark {
      width: 72px;
      height: 72px;
      filter: drop-shadow(0 0 24px rgba(0, 229, 204, 0.35));
    }

    #app-splash .app-splash-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    #app-splash .app-splash-spinner {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid hsla(217.2, 91.2%, 59.8%, 0.25);
      border-top-color: hsl(217.2 91.2% 59.8%);
      animation: app-splash-spin 0.8s linear infinite;
    }

    @keyframes app-splash-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <div id="app-splash" role="presentation" aria-hidden="true">
    <div class="app-splash-bubbles">
      <div class="app-splash-bubble" style="left:10%; width:14px; height:14px; animation-duration:14s; animation-delay:0s; --drift:20px; --end-scale:1.2;"></div>
      <div class="app-splash-bubble" style="left:25%; width:8px; height:8px; animation-duration:10s; animation-delay:2s; --drift:-15px; --end-scale:0.8;"></div>
      <div class="app-splash-bubble" style="left:40%; width:20px; height:20px; animation-duration:18s; animation-delay:1s; --drift:30px; --end-scale:1.4;"></div>
      <div class="app-splash-bubble" style="left:55%; width:10px; height:10px; animation-duration:12s; animation-delay:4s; --drift:-25px; --end-scale:0.9;"></div>
      <div class="app-splash-bubble" style="left:70%; width:16px; height:16px; animation-duration:16s; animation-delay:3s; --drift:15px; --end-scale:1.1;"></div>
      <div class="app-splash-bubble" style="left:82%; width:9px; height:9px; animation-duration:11s; animation-delay:5s; --drift:-10px; --end-scale:0.7;"></div>
      <div class="app-splash-bubble" style="left:92%; width:13px; height:13px; animation-duration:15s; animation-delay:6s; --drift:20px; --end-scale:1;"></div>
    </div>
    <div class="app-splash-content">
      <img class="app-splash-mark" src="/mascot-icon-128.png" alt="" width="72" height="72" />
      <div class="app-splash-title">Git Manager</div>
      <div class="app-splash-spinner"></div>
    </div>
  </div>
  <script>
    // Runs synchronously, before the module script below, so the splash
    // matches the user's persisted theme instead of always flashing dark.
    (function () {
      try {
        var raw = localStorage.getItem('git-manager-settings')
        var theme = raw ? JSON.parse(raw).state.settings.appearance.theme : 'dark'
        if (theme === 'system') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        }
        if (['light', 'github-light', 'solarized-light'].indexOf(theme) !== -1) {
          document.getElementById('app-splash').setAttribute('data-theme', 'light')
        }
      } catch (e) {
        // Missing or corrupt settings — keep the default dark splash.
      }
    })()
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
