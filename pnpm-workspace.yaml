packages:
  - "apps/*"
  - "packages/*"

overrides:
  "@wdio/native-utils": "^2.5.0"

catalog:
  typescript: ^7.0.2
  react: ^18.3.1
  react-dom: ^18.3.1
  "@types/react": ^18.3.12
  "@types/react-dom": ^18.3.1
  "@types/node": ^26.0.0
  vitest: ^3.0.7
  "@vitest/browser": ^3.0.7
  "@testing-library/jest-dom": ^6.6.3
  "@testing-library/react": ^16.1.0
  "@testing-library/user-event": ^14.5.2
  jsdom: ^25.0.1
  vite: ^6.0.3
  lucide-react: ^0.468.0
  "@vitejs/plugin-react": ^4.3.4
  tailwindcss: ^3.4.17
  autoprefixer: ^10.4.20
  postcss: ^8.4.49
  storybook: ^10.4.6
  "@storybook/react": ^10.4.6
  "@storybook/react-vite": ^10.4.6
  # Pinned exact: Storybook requires every @storybook/* package on the identical
  # version. A caret let addon-a11y float to 10.5.2 while core stayed 10.4.6, which
  # crashed the preview (react interop) and desynced the UniversalStore.
  "@storybook/addon-a11y": 10.4.6
  "@storybook/addon-vitest": 10.4.6
  "@monaco-editor/react": ^4.6.0
  monaco-editor: ^0.52.0

allowBuilds:
  '@swc/core': true
  edgedriver: true
  esbuild: true
  geckodriver: true
  msw: true
  unrs-resolver: true
