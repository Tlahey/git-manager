name: Deploy Landing Page

on:
  push:
    branches:
      - main
    paths:
      # Only deploy when the landing page itself (or this workflow) changes.
      # The page also depends on packages/mascot — after a mascot-only change,
      # trigger a manual redeploy from the Actions tab (workflow_dispatch).
      - 'apps/landing-page/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

# Native GitHub Pages deployment (no gh-pages branch): the build is uploaded
# as an ephemeral artifact and published via OIDC. Repo Settings → Pages must
# use source "GitHub Actions" — configure-pages enables it automatically.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let in-flight deployments finish (GitHub's recommendation)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build landing page
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build landing page
        run: pnpm --filter @git-manager/landing-page build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/landing-page/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
