name: Prepare Release

# Manually triggered from the Actions tab. Bumps the app version everywhere it's declared
# (root + desktop package.json, tauri.conf.json, Cargo.toml), auto-generates a CHANGELOG.md entry
# for the new version from GitHub's own "generate release notes" API (the same merged-PR list
# shown when you click "Generate release notes" on a GitHub Release — see the "Fetch PR-based
# release notes" and "Update CHANGELOG.md" steps), commits it all straight to main, then tags the
# commit — which is what actually triggers `release.yml` (it watches for `v*.*.*` tag pushes) to
# build, sign and publish the release using that same CHANGELOG.md section as the Release body.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version part to bump'
        type: choice
        options: [patch, minor, major]
        default: patch
        required: true

permissions:
  contents: write
  pull-requests: read

jobs:
  bump-and-tag:
    name: Bump version & tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          current=$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version")
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          next="$major.$minor.$patch"
          echo "Bumping $current -> $next (${{ inputs.bump }})"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Update package.json / tauri.conf.json
        run: |
          node -e "
            const fs = require('fs');
            const next = '${{ steps.version.outputs.next }}';
            for (const file of ['package.json', 'apps/desktop/package.json', 'apps/desktop/src-tauri/tauri.conf.json']) {
              const json = JSON.parse(fs.readFileSync(file, 'utf8'));
              json.version = next;
              fs.writeFileSync(file, JSON.stringify(json, null, 2) + '\n');
            }
          "

      - name: Update Cargo.toml
        run: |
          node -e "
            const fs = require('fs');
            const path = 'apps/desktop/src-tauri/Cargo.toml';
            const next = '${{ steps.version.outputs.next }}';
            const content = fs.readFileSync(path, 'utf8');
            const updated = content.replace(/^version = \"\d+\.\d+\.\d+\"/m, \`version = \"\${next}\"\`);
            if (updated === content) throw new Error('Cargo.toml version line not found');
            fs.writeFileSync(path, updated);
          "

      - name: Fetch PR-based release notes from GitHub
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f "tag_name=v${{ steps.version.outputs.next }}" \
            -f "previous_tag_name=v${{ steps.version.outputs.current }}" \
            -f "target_commitish=main" \
            --jq .body > /tmp/release-notes.md

      - name: Update CHANGELOG.md
        run: |
          node -e "
            const fs = require('fs');

            const next = '${{ steps.version.outputs.next }}';
            const date = new Date().toISOString().slice(0, 10);
            const notes = fs.readFileSync('/tmp/release-notes.md', 'utf8').trim();

            const entry = '## [' + next + '] - ' + date + '\n\n' + (notes || '_No notable changes._') + '\n';
            const unreleasedNote = '_Auto-populated at release time from the merged pull requests since the last tag, via the GitHub release notes API — see .github/workflows/prepare-release.yml._';

            const path = 'CHANGELOG.md';
            const content = fs.readFileSync(path, 'utf8');
            const marker = '## [Unreleased]';
            const markerIdx = content.indexOf(marker);
            if (markerIdx === -1) throw new Error('CHANGELOG.md is missing an ## [Unreleased] heading');
            const bodyStart = content.indexOf('\n', markerIdx) + 1;
            const nextHeadingIdx = content.indexOf('\n## [', bodyStart);
            const bodyEnd = nextHeadingIdx === -1 ? content.length : nextHeadingIdx + 1;
            const updated = content.slice(0, bodyStart) + '\n' + unreleasedNote + '\n\n' + entry + '\n' + content.slice(bodyEnd);
            fs.writeFileSync(path, updated);

            console.log('Inserted CHANGELOG.md entry for ' + next);
          "

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json apps/desktop/package.json apps/desktop/src-tauri/tauri.conf.json apps/desktop/src-tauri/Cargo.toml CHANGELOG.md
          git commit -m "chore(release): bump version to v${{ steps.version.outputs.next }}"
          git tag "v${{ steps.version.outputs.next }}"
          git push origin HEAD:main --follow-tags
